train_test_split:
  test_size: 0.3
  random_state: 42

random_forest:
  param_dist:
    n_estimators: [200, 300]
    max_features: ["sqrt"]
    max_depth: [5, 8, 10]
    min_samples_split: [5, 10]
    min_samples_leaf: [2, 4]
    criterion: ["gini"]
  search:
    n_iter: 12
    cv: 3
    random_state: 42
    n_jobs: -1
